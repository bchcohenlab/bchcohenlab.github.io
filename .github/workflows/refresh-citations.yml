name: Refresh Scholar citations

on:
  # Weekly, Monday 08:00 UTC. (Runs from the default branch after cutover.)
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Needs to commit refreshed counts and deploy the rebuilt site.
permissions:
  contents: write
  pages: write
  id-token: write

# Share the "pages" concurrency group with deploy.yml so the two never deploy
# at the same time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh citation counts from Google Scholar (SerpAPI)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        # No-op (exits 0) if the secret is missing or SerpAPI is unreachable.
        run: node scripts/refresh-citations.mjs

      - name: Commit refreshed counts (if any changed)
        run: |
          if [ -n "$(git status --porcelain src/content/publications)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/content/publications
            git commit -m "chore: refresh Google Scholar citation counts [skip ci]"
            git push
          else
            echo "No citation changes."
          fi

      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
